<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#212121;
    color:white;
    display:flex;
    justify-content:center;
    height:100vh;
}

.container{
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
}

.header{
    padding:20px;
    text-align:center;
    font-size:24px;
    border-bottom:1px solid #444;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:80%;
    padding:12px 16px;
    margin:10px 0;
    border-radius:12px;
}

.user{
    background:#2d6cdf;
    margin-left:auto;
}

.ai{
    background:#343541;
}

.input-area{
    display:flex;
    padding:20px;
    gap:10px;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2f2f2f;
    color:white;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:10px;
    background:#19c37d;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">AI Assistant</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="prompt" placeholder="Напишите сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script>
function addMessage(text, type){
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById("prompt");
    const text = input.value.trim();

    if(!text) return;

    addMessage(text, "user");
    input.value = "";

    try{
        const response = await fetch("/chat", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({message:text})
        });

        const data = await response.json();

        addMessage(data.reply, "ai");

    }catch(error){
        addMessage("Ошибка соединения", "ai");
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<style>
body{
  background:#212121;
  color:white;
  font-family:Arial;
  max-width:900px;
  margin:auto;
}
#chat{
  height:80vh;
  overflow:auto;
  padding:20px;
}
.user{
  background:#2563eb;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
}
.bot{
  background:#343541;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
}
.input{
  display:flex;
  gap:10px;
}
input{
  flex:1;
  padding:15px;
}
button{
  padding:15px;
}
</style>
</head>
<body>

<div id="chat"></div>

<div class="input">
  <input id="message" placeholder="Введите сообщение">
  <button onclick="sendMessage()">Отправить</button>
</div>

<script>
const WEBHOOK =
"https://enjoyer570.app.n8n.cloud/webhook/generate-project";

async function sendMessage(){

  const input = document.getElementById("message");
  const text = input.value;

  if(!text) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="user">${text}</div>
  `;

  input.value = "";

  const response = await fetch(WEBHOOK,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:text
    })
  });

  const data = await response.json();

  chat.innerHTML += `
    <div class="bot">${data.reply}</div>
  `;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
